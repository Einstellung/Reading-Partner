[package]
name = "reading-partner"
version = "0.1.0"
description = "AI reading partner"
authors = ["Reading-Partner"]
edition = "2021"

[lib]
name = "reading_partner_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-http = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }

# Full dev rebuilds peak at many GB of linker memory, which has triggered
# systemd-oomd to kill the whole desktop session (docs/pitfall/14).
[profile.dev]
debug = "line-tables-only"
split-debuginfo = "unpacked"
