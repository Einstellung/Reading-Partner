<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
	<meta charset="UTF-8">
	<title>Reader View</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<link href="view.css" rel="stylesheet">
	<style>html,body{margin:0;height:100%}#view{position:absolute;inset:0}</style>
</head>
<body>
	<!-- The mobile pdf.js build calls Math.sumPrecise without polyfilling it; on engines
	     lacking the native method, text-layer geometry throws and popup rects never fire.
	     See docs/04-reader对接备忘.md. Must run before view.js. -->
	<script>
		if (typeof Math.sumPrecise !== 'function') {
			Math.sumPrecise = function (v) { let s = 0; for (const x of v) s += x; return s; };
		}
	</script>

	<div id="view"></div>

	<!-- view.js (UMD) defines window.createView(). The shell reaches in via the iframe's
	     contentWindow.createView and passes its own options/callbacks. No logic here. -->
	<script src="view.js"></script>
</body>
</html>
