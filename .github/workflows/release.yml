name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # The reader engine is plain JS: build it once on Linux and hand the artifact
  # to every platform. Building it per-platform would mean running its bash +
  # webpack + pdf.js pipeline under Windows' Git Bash for no gain.
  reader:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The webpack build fetches Zotero locale files over the network, and the
      # mobile pdf.js build needs Node's legacy OpenSSL provider (docs/pitfall/08).
      - name: Build the reader engine
        run: ./scripts/build-reader.sh

      - uses: actions/upload-artifact@v4
        with:
          name: reader
          path: public/reader
          retention-days: 1

  app:
    needs: reader
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported glibc/webkit pair, so the AppImage and .deb run on
          # more than the runner itself.
          - platform: ubuntu-22.04
            args: ""
          # One universal binary rather than two downloads.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      # No submodules: the shell only needs public/reader, which arrives as an
      # artifact.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: reader
          path: public/reader

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Reading Partner ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
