name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  app:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported glibc/webkit pair, so the AppImage and .deb run on
          # more than the runner itself.
          - platform: ubuntu-22.04
            args: ""
          # One universal binary rather than two downloads.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - run: bun install --frozen-lockfile

      # Stage the self-hosted PDFium wasm (gitignored; sourced offline from the
      # @embedpdf/pdfium package installed above).
      - name: Copy PDFium wasm
        shell: bash
        run: bun run wasm

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Reading Partner ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
