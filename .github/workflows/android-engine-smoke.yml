# Android engine gate. Build a VITE_SMOKE=1 debug APK, boot an x86_64 Android
# emulator on the Ubuntu runner (KVM), install and launch, and read back the
# machine verdict src/smoke writes. It answers the one real Android unknown: can
# EmbedPDF's PDFium WASM load and rasterize a page in the Android System WebView
# (Chromium) served over Tauri's http://tauri.localhost, the way it already can in
# iOS WKWebView (docs/pitfall/33)? The Android WebView is a different engine, so it
# needs its own gate.
#
# The APK is a UNIVERSAL debug build (x86_64 + arm64): the emulator runs the
# x86_64 slice, and the very same artifact installs on the user's arm64 phone —
# so if the emulator line ever degrades (WebView/GPU), the smoke APK uploaded here
# lets the user run the same gate on a real device. Debug (debuggable) is required
# so `adb run-as` can read the result file out of the app's private data dir; the
# result location under AppData is not assumed, it is found by name (as on iOS).
#
# Independent of android-apk.yml (the signed release product line).

name: Android Engine Smoke

on:
  push:
    branches: [android-spike]
  workflow_dispatch:

concurrency:
  group: android-engine-smoke
  cancel-in-progress: true

env:
  NDK_VERSION: "26.3.11579264"
  BUNDLE_ID: com.xinyuan.readingpartner

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      # Build the frontend in smoke mode: main.tsx runs src/smoke instead of the
      # app. tauri's beforeBuildCommand (bun run build) inherits this env.
      VITE_SMOKE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: oven-sh/setup-bun@v2

      # x86_64 for the emulator, aarch64 so the same APK also installs on a phone.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android,aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - run: bun install --frozen-lockfile

      - name: Copy pdfium.wasm
        run: bun run wasm

      - name: Initialize the Android project
        run: bun tauri android init --ci

      # Universal debug APK containing both ABIs. No --split-per-abi => one APK.
      - name: Build the smoke debug APK
        run: bun tauri android build --apk --debug --target x86_64 aarch64

      - name: Stage the smoke APK
        run: |
          set -euo pipefail
          APK=$(find src-tauri/gen/android -path '*debug*' -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::no debug APK produced"; find src-tauri/gen/android -name '*.apk' || true; exit 1
          fi
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          OUT="reading-partner-${VERSION}-android-smoke-debug.apk"
          cp "$APK" "$OUT"
          echo "SMOKE_APK=$OUT" >> "$GITHUB_ENV"
          echo "staged: $OUT ($(du -h "$OUT" | cut -f1))"

      # Upload the smoke APK now, before the emulator runs, so a real-device
      # fallback exists even if the emulator step never reaches upload.
      - name: Upload the smoke APK
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-apk
          path: ${{ env.SMOKE_APK }}
          if-no-files-found: error

      # KVM permissions for a fast hardware-accelerated emulator.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Boot an x86_64 emulator, install the smoke APK, launch it, and read back
      # the verdict src/smoke writes into the app's private data dir. Gate is red
      # unless ok:true.
      - name: Boot emulator, launch, read the smoke verdict
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The emulator-runner runs `script` line by line under dash, which
          # breaks multi-line shell (for/if); invoke one bash file instead.
          script: bash "$GITHUB_WORKSPACE/.github/scripts/android-smoke-gate.sh"

      - name: Upload smoke verdict and screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-verdict
          path: |
            smoke-result.json
            smoke-screenshot.png
          if-no-files-found: warn
